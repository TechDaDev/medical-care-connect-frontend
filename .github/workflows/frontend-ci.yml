name: Frontend CI

on:
  pull_request:
    paths:
      - "src/**"
      - "package.json"
      - "package-lock.json"
      - "Dockerfile"
      - "docker/**"
      - ".github/workflows/frontend-ci.yml"
  push:
    branches: [main]
    paths:
      - "src/**"
      - "package.json"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm run test -- --run

      - name: Production build
        run: npm run build

      - name: Verify locale parity
        run: npx vitest run --reporter=verbose 2>&1 | grep -q "Locale key parity"

      - name: Verify no JWT localStorage regression
        run: |
          ! grep -r "localStorage.*mcc_access" src/ --include="*.ts" --include="*.tsx"
          ! grep -r "localStorage.*mcc_refresh" src/ --include="*.ts" --include="*.tsx"

      - name: Build Docker image
        run: docker build --no-cache -t mcc-frontend:ci .
