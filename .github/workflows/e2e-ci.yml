name: E2E CI

on:
  pull_request:
    paths:
      - "src/**"
      - "e2e/**"
      - "package.json"
  push:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout backend
        uses: actions/checkout@v4
        with:
          repository: TechDaDev/medical-care-connect
          path: backend

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install Python deps
        working-directory: ./backend
        run: pip install -r requirements.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install frontend deps
        run: npm ci

      - name: Start PostgreSQL
        run: |
          docker compose -f backend/docker-compose.production.yml up -d db
          sleep 3

      - name: Run backend migrations
        working-directory: ./backend
        env:
          DJANGO_SETTINGS_MODULE: config.settings.development
          SECRET_KEY: e2e-test-key-not-for-production
          DEBUG: "True"
          ALLOWED_HOSTS: "*"
          CORS_ALLOWED_ORIGINS: http://localhost:5173
          POSTGRES_DB: mcc_db
          POSTGRES_USER: mcc_user
          POSTGRES_PASSWORD: mcc_user_pass
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
        run: python manage.py migrate

      - name: Start backend
        working-directory: ./backend
        env:
          DJANGO_SETTINGS_MODULE: config.settings.development
          SECRET_KEY: e2e-test-key-not-for-production
          DEBUG: "True"
          ALLOWED_HOSTS: "*"
          CORS_ALLOWED_ORIGINS: http://localhost:5173
          POSTGRES_DB: mcc_db
          POSTGRES_USER: mcc_user
          POSTGRES_PASSWORD: mcc_user_pass
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
        run: |
          python manage.py runserver 0.0.0.0:8000 &
          sleep 3

      - name: Build frontend
        run: npm run build

      - name: Start frontend preview
        run: |
          npx vite preview --port 5173 &
          sleep 2

      - name: Install Playwright
        run: npx playwright install chromium

      - name: Run E2E tests
        env:
          E2E_BASE_URL: http://localhost:5173
          E2E_PATIENT_EMAIL: patient@mcc.dev
          E2E_PATIENT_PASSWORD: testpass123
          E2E_DOCTOR_EMAIL: doctor@mcc.dev
          E2E_DOCTOR_PASSWORD: testpass123
          E2E_COORDINATOR_EMAIL: coordinator@mcc.dev
          E2E_COORDINATOR_PASSWORD: testpass123
        run: npx playwright test

      - name: Upload artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
